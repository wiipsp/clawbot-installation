# ── 当前激活的配置文件 ────────────────────────────────────────────────────────
# 本地开发: 这个文件直接是 dev 配置（use_default_settings: true，不过滤引擎）
# 服务器部署: install_searxng_tavily.sh 会自动用 settings.prod.yml 覆盖此文件
#
# 如需手动切换:
#   本地:  cp settings.dev.yml  settings.yml
#   服务器: cp settings.prod.yml settings.yml

# ── 本地开发配置（macOS / Docker Desktop）
use_default_settings: true

general:
  instance_name: "Hybrid Search Internal (dev)"
server:
  limiter: false
search:
  default_lang: "zh-CN"
  formats:
    - html
    - json
outgoing:
  verify: false          # Docker Desktop 容器内 CA 不完整，禁用 SSL 验证
  request_timeout: 10.0
valkey:
  url: redis://redis:6379/0

engines:
  # --- Custom engines (not in SearXNG defaults) ---
  - name: juejin
    engine: juejin
    shortcut: jj
    categories: [general, it]
    timeout: 4.0
  - name: csdn
    engine: csdn
    shortcut: cs
    categories: [general, it]
    timeout: 5.0

  # --- Finance & news engines (domestic, GFW-safe) ---
  - name: sinafinance
    engine: sinafinance
    shortcut: sfn
    categories: [finance, news, general]
    timeout: 5.0
  - name: 36kr
    engine: kr36
    shortcut: kr
    categories: [news, it]
    timeout: 6.0

  # --- International RSS engines (disabled: require non-GFW network) ---
  # Uncomment if deploying behind a proxy or in a non-GFW environment.
  # - name: economist
  #   engine: economist
  #   shortcut: eco
  #   categories: [news, finance]
  #   timeout: 8.0
  # - name: foreignaffairs
  #   engine: foreignaffairs
  #   shortcut: fa
  #   categories: [news]
  #   timeout: 8.0
